---
layout: default
title: Search Chats
permalink: /search/
---

<div class="search-container" data-page="search">
  <div class="tag-cloud" id="tagCloud" aria-label="Các tag phổ biến"></div>
  <div class="search-results" id="searchResults" role="list">
    <p class="search-placeholder">Hãy nhập tag để bắt đầu tìm kiếm.</p>
  </div>
</div>

<script type="application/json" id="searchData">
[
{% assign search_posts = site.posts | sort: 'date' | reverse %}
{% for post in search_posts %}
  {
    "title": {{ post.title | jsonify }},
    "url": {{ post.url | relative_url | jsonify }},
    "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
    "tags": {{ post.tags | jsonify }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
]
</script>
<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
